<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمد محمود | Ahmed Mahmoud</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-navy: #080F34;
            --neon-green: #CBFF20;
            --pure-white: #FFFFFF;
            --pure-black: #000000;
        }

        body {
            background-color: var(--dark-navy);
            color: var(--pure-white);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        header {
            width: 100%;
            background-color: var(--pure-black);
            padding: 15px 0;
            position: absolute;
            top: 0;
            border-bottom: 3px solid var(--neon-green);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تنسيق صورة اللوجو */
        .logo {
            height: 120px; /* يمكنك تكبير أو تصغير اللوجو بتغيير هذا الرقم */
            width: 120px;
        }

        h1 {
            color: var(--neon-green);
            font-weight: 900;
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto 30px auto;
            color: var(--pure-white);
        }

        .btn {
            display: inline-block;
            background-color: var(--neon-green);
            color: var(--dark-navy);
            padding: 15px 40px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            border-radius: 5px;
            transition: 0.3s;
            border: 2px solid var(--neon-green);
        }

        .btn:hover {
            background-color: transparent;
            color: var(--neon-green);
        }

        .grid-line {
            width: 100px;
            height: 6px;
            background-color: var(--neon-green);
            margin: 15px auto 30px auto;
        }
    </style>
</head>
<body>

    <header>
        <!-- تم استدعاء صورة اللوجو هنا -->
        <img src="logo.png" alt="Ahmed Mahmoud Logo" class="logo">
    </header>

    <main style="padding-top: 100px; padding-left: 20px; padding-right: 20px;">
        <h1>أهلاً بك في عالمي</h1>
        <div class="grid-line"></div>
        <p>هذا هو الإصدار الجديد من موقعي. تم تصميمه باستخدام ألوان هويتي البصرية ليعكس طابعي الشخصي والاحترافي.</p>
        <a href="#" class="btn">شاهد أعمالي</a>
    </main>

</body>
</html>
